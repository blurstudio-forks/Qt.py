name: Tox testing

on:
  push:
    branches:
      - "*"
  pull_request:
    branches:
      - "*"

jobs:
  test:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        test_env: [
          # 'test-2021-PySide2',
          # 'test-2021-PyQt5',
          # 'test-2023-PySide2',
          'test-2023-PyQt5',
          'test-2023-PySide6',
          # 'test-2023-PyQt6',
          'test-2025-PySide6',
          # 'test-2025-PyQt6',
        ]

    env:
      QT_QPA_PLATFORM: minimal
      QT_VERBOSE: 1

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup tox
        uses: ./.github/actions/setup-tox

      - name: Run Tox
        run: |
          which tox
          tox -e ${{ matrix.test_env }}

